<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Duas">
<title>My Duas 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Quicksand:wght@500;600;700&family=Pacifico&family=Comfortaa:wght@400;600;700&family=Caveat:wght@500;600;700&family=DM+Serif+Display&family=Josefin+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fdf8f5;--bg2:#fff5f0;--surface:#fff;--card:#fff;--card2:#fef3ef;
  --accent:#d4836a;--accent2:#e8a892;--accentsoft:rgba(212,131,106,0.12);
  --text:#2d1f1a;--text2:#7a5a52;--text3:#b8968c;
  --border:rgba(212,131,106,0.18);
  --shadow:0 4px 20px rgba(212,131,106,0.1);--shadow2:0 2px 12px rgba(212,131,106,0.08);
  --tab-h:82px;--safe-bottom:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,44px);
  --radius:26px;--fs:1;
  --font-body:'Nunito',sans-serif;--font-display:'Nunito',sans-serif;
}
/* DARK */
body.dark{--bg:#1a1218;--bg2:#1f1520;--surface:#241c22;--card:#2b2028;--card2:#32272f;--accent:#e0a090;--accent2:#f0bfb0;--accentsoft:rgba(224,160,144,0.12);--text:#f5ede8;--text2:#c4968c;--text3:#8a6860;--border:rgba(224,160,144,0.15);--shadow:0 4px 20px rgba(0,0,0,0.3);--shadow2:0 2px 12px rgba(0,0,0,0.22);}
/* ACCENTS - Girly */
body.ac-rose{--accent:#d4739a;--accent2:#e8a0be;--accentsoft:rgba(212,115,154,0.12);}
body.ac-lilac{--accent:#a07acc;--accent2:#c09ae0;--accentsoft:rgba(160,122,204,0.12);}
body.ac-lavender{--accent:#b08ecf;--accent2:#cdb0e8;--accentsoft:rgba(176,142,207,0.13);}
body.ac-bubblegum{--accent:#e87aab;--accent2:#f5a8ce;--accentsoft:rgba(232,122,171,0.12);}
body.ac-cherry{--accent:#c94f6a;--accent2:#e8809a;--accentsoft:rgba(201,79,106,0.12);}
body.ac-blush{--accent:#e8a0a0;--accent2:#f5c4c4;--accentsoft:rgba(232,160,160,0.13);}
body.ac-mauve{--accent:#b06080;--accent2:#cc8fa8;--accentsoft:rgba(176,96,128,0.12);}
body.ac-coral{--accent:#e86050;--accent2:#f59080;--accentsoft:rgba(232,96,80,0.12);}
/* Accents - Boy */
body.ac-ocean{--accent:#3a7acc;--accent2:#6aa0e0;--accentsoft:rgba(58,122,204,0.12);}
body.ac-navy{--accent:#2a4a8a;--accent2:#4a6aaa;--accentsoft:rgba(42,74,138,0.1);}
body.ac-forest{--accent:#3a7a5a;--accent2:#5a9a78;--accentsoft:rgba(58,122,90,0.1);}
body.ac-slate{--accent:#5a6a8a;--accent2:#7a8aaa;--accentsoft:rgba(90,106,138,0.1);}
body.ac-cobalt{--accent:#2a6acc;--accent2:#5090e0;--accentsoft:rgba(42,106,204,0.12);}
body.ac-teal{--accent:#2a8a8a;--accent2:#50aaaa;--accentsoft:rgba(42,138,138,0.1);}
body.ac-sage{--accent:#78a88a;--accent2:#9ec4a8;--accentsoft:rgba(120,168,138,0.1);}
/* Neutral */
body.ac-gold{--accent:#c9a86a;--accent2:#e0c88a;--accentsoft:rgba(201,168,106,0.12);}
body.ac-taupe{--accent:#8a7060;--accent2:#aa9080;--accentsoft:rgba(138,112,96,0.1);}
body.ac-charcoal{--accent:#555;--accent2:#777;--accentsoft:rgba(85,85,85,0.08);}

/* FONTS */
body.f-nunito{--font-body:'Nunito',sans-serif;--font-display:'Nunito',sans-serif;}
body.f-quicksand{--font-body:'Quicksand',sans-serif;--font-display:'Quicksand',sans-serif;}
body.f-pacifico{--font-display:'Pacifico',cursive;--font-body:'Nunito',sans-serif;}
body.f-comfortaa{--font-body:'Comfortaa',cursive;--font-display:'Comfortaa',cursive;}
body.f-caveat{--font-body:'Caveat',cursive;--font-display:'Caveat',cursive;}
body.f-dmsans{--font-display:'DM Serif Display',serif;--font-body:'Nunito',sans-serif;}
body.f-josefin{--font-body:'Josefin Sans',sans-serif;--font-display:'Josefin Sans',sans-serif;}
body.f-georgia{--font-display:Georgia,serif;--font-body:Georgia,serif;}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);height:100dvh;overflow:hidden;transition:background 0.3s,color 0.3s;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;}
.screen.active{display:flex;}

/* HEADER */
.header{padding:calc(var(--safe-top) + 10px) 16px 13px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid var(--border);flex-shrink:0;}
.header-left h1{font-family:var(--font-display);font-size:calc(22px * var(--fs));font-weight:900;color:var(--accent);letter-spacing:-0.01em;line-height:1.1;}
.header-left .sub{font-size:calc(10px * var(--fs));font-weight:700;color:var(--text3);margin-top:1px;}
.hbtn{width:38px;height:38px;border-radius:50%;background:var(--card);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all 0.18s;box-shadow:var(--shadow2);}
.hbtn:active{transform:scale(0.88);}
.hbtn-row{display:flex;gap:7px;}
.edit-banner{background:linear-gradient(90deg,var(--accent),var(--accent2));color:white;text-align:center;font-size:calc(11px * var(--fs));font-weight:800;padding:7px 16px;letter-spacing:0.05em;display:none;flex-shrink:0;}
.edit-banner.on{display:block;}

/* SEARCH */
.search-wrap{padding:8px 16px 2px;flex-shrink:0;display:none;}
.search-wrap.open{display:block;}
.search-inner{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:50px;padding:8px 16px;}
.search-inner input{flex:1;background:none;border:none;outline:none;font-family:var(--font-body);font-size:calc(13px * var(--fs));font-weight:700;color:var(--text);}
.search-inner input::placeholder{color:var(--text3);}

/* MAIN TABS */
.main-tabs{display:flex;padding:8px 14px 0;gap:7px;flex-shrink:0;}
.main-tab{flex:1;padding:9px 6px;border-radius:50px;font-size:calc(11px * var(--fs));font-weight:800;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--text3);transition:all 0.22s;text-align:center;box-shadow:var(--shadow2);}
.main-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border-color:transparent;box-shadow:0 4px 16px color-mix(in srgb,var(--accent) 40%,transparent);}
.main-tab:active{transform:scale(0.95);}

/* SUB PILLS */
.sub-pills{display:flex;gap:7px;overflow-x:auto;padding:8px 14px 3px;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0;}
.sub-pills::-webkit-scrollbar{display:none;}
.sub-pill{flex-shrink:0;padding:5px 13px;border-radius:50px;font-size:calc(10px * var(--fs));font-weight:800;cursor:pointer;border:1.5px solid var(--border);background:var(--card2);color:var(--text2);white-space:nowrap;transition:all 0.2s;display:flex;align-items:center;gap:5px;}
.sub-pill.active{background:var(--accentsoft);color:var(--accent);border-color:var(--accent);}
.sub-pill:active{transform:scale(0.94);}
.sub-pill-del{font-size:10px;opacity:0.6;padding:1px 3px;border-radius:50px;display:none;}
.edit-mode-on .sub-pill-del{display:inline;}
.sub-pill-del:active{opacity:1;}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;padding:12px 14px;padding-bottom:calc(var(--tab-h) + var(--safe-bottom) + 70px);-webkit-overflow-scrolling:touch;}
.scroll-area::-webkit-scrollbar{display:none;}
.list-sec-lbl{font-size:calc(10px * var(--fs));font-weight:800;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;padding:14px 2px 7px;display:flex;align-items:center;gap:8px;}
.list-sec-lbl::after{content:'';flex:1;height:1px;background:var(--border);}

/* DUA CARD */
.dua-card{background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);margin-bottom:11px;overflow:hidden;box-shadow:var(--shadow2);transition:all 0.22s;}
.dua-card-header{padding:14px 15px 12px;display:flex;align-items:flex-start;justify-content:space-between;cursor:pointer;gap:10px;}
.dua-title-row{flex:1;min-width:0;}
.dua-title{font-size:calc(14px * var(--fs));font-weight:800;color:var(--text);line-height:1.35;font-family:var(--font-display);}
.dua-repeat-badge{display:inline-block;font-size:calc(9px * var(--fs));font-weight:800;color:var(--accent);background:var(--accentsoft);border-radius:50px;padding:2px 9px;margin-bottom:4px;border:1px solid var(--accent);}
.dua-expand-icon{color:var(--text3);font-size:18px;transition:transform 0.3s;flex-shrink:0;font-weight:900;line-height:1;margin-top:2px;}
.dua-card.expanded .dua-expand-icon{transform:rotate(180deg);}
.dua-body{max-height:0;overflow:hidden;transition:max-height 0.42s cubic-bezier(0.4,0,0.2,1);}
.dua-card.expanded .dua-body{max-height:1000px;}
.dua-inner{padding:0 15px 15px;border-top:1.5px solid var(--border);}
.arabic-text{font-size:calc(20px * var(--fs));line-height:2.1;text-align:right;direction:rtl;color:var(--accent);font-weight:800;padding:13px 0 9px;border-bottom:1.5px solid var(--border);margin-bottom:9px;}
.translit-text{font-size:calc(12px * var(--fs));font-weight:700;color:var(--text2);font-style:italic;line-height:1.8;margin-bottom:8px;}
.translation-text{font-size:calc(13px * var(--fs));font-weight:700;color:var(--text);line-height:1.75;margin-bottom:7px;}
.notes-bubble{font-size:calc(11px * var(--fs));font-weight:700;color:var(--accent);line-height:1.65;background:var(--accentsoft);border-radius:16px;padding:9px 13px;margin-top:7px;border:1px solid var(--border);}
.card-actions{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap;}
.cta{flex:1;min-width:60px;padding:8px 5px;border-radius:50px;border:1.5px solid var(--border);background:var(--card2);color:var(--text2);font-size:calc(10px * var(--fs));font-family:var(--font-body);cursor:pointer;font-weight:800;transition:all 0.18s;display:flex;align-items:center;justify-content:center;gap:3px;}
.cta:active{transform:scale(0.94);}
.cta.fav{color:var(--accent);border-color:var(--accent);background:var(--accentsoft);}
.cta.edit-btn{color:#6a9fcc;border-color:rgba(106,159,204,0.3);}
.cta.del{color:#e07070;border-color:rgba(224,112,112,0.25);}

/* TAB BAR */
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-bottom));background:var(--surface);border-top:1.5px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;padding-bottom:var(--safe-bottom);z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,0.06);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 3px;transition:all 0.2s;}
.tab:active{opacity:0.7;}
.tab-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;background:transparent;transition:all 0.2s;}
.tab.active .tab-icon{background:var(--accentsoft);}
.tab-label{font-size:9px;font-weight:800;color:var(--text3);letter-spacing:0.03em;}
.tab.active .tab-label{color:var(--accent);}

/* FAB */
.fab{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bottom) + 13px);right:15px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;display:flex;align-items:center;justify-content:center;font-size:26px;color:white;cursor:pointer;z-index:99;box-shadow:0 6px 24px color-mix(in srgb,var(--accent) 50%,transparent);transition:all 0.2s;}
.fab:active{transform:scale(0.88);}

/* SHEETS */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(6px);}
.sheet-overlay.open{display:flex;}
.sheet{background:var(--surface);width:100%;border-radius:32px 32px 0 0;padding:0 0 calc(var(--safe-bottom) + 22px);max-height:93dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:slideUp 0.32s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-handle{width:40px;height:5px;background:var(--border);border-radius:3px;margin:13px auto 0;}
.sheet-title{font-family:var(--font-display);font-size:calc(19px * var(--fs));font-weight:900;color:var(--text);padding:13px 20px 2px;text-align:center;}
.sheet-sub{font-size:calc(11px * var(--fs));font-weight:700;color:var(--text3);text-align:center;margin-bottom:16px;}
.form-group{padding:0 17px 13px;}
.form-label{font-size:9px;font-weight:800;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;margin-bottom:6px;display:block;}
.form-input,.form-textarea{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:18px;padding:11px 15px;color:var(--text);font-family:var(--font-body);font-size:calc(13px * var(--fs));font-weight:700;outline:none;-webkit-appearance:none;appearance:none;}
.form-input:focus,.form-textarea:focus{border-color:var(--accent);}
.form-textarea{min-height:74px;resize:none;line-height:1.65;}
.arabic-input{direction:rtl;text-align:right;font-size:calc(17px * var(--fs));line-height:1.9;color:var(--accent);}
.main-sec-picker{display:flex;gap:7px;margin-bottom:0;}
.msec-opt{flex:1;padding:9px 5px;border-radius:50px;text-align:center;font-size:calc(10px * var(--fs));font-weight:800;border:1.5px solid var(--border);background:var(--card2);color:var(--text2);cursor:pointer;transition:all 0.2s;}
.msec-opt.selected{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border-color:transparent;}
.sec-picker{display:flex;flex-wrap:wrap;gap:6px;padding:3px 0;}
.sec-opt{padding:6px 12px;border-radius:50px;font-size:calc(10px * var(--fs));font-weight:800;border:1.5px solid var(--border);background:var(--card2);color:var(--text2);cursor:pointer;transition:all 0.18s;}
.sec-opt.selected{background:var(--accentsoft);color:var(--accent);border-color:var(--accent);}
.new-sec-row{display:flex;gap:7px;margin-top:7px;}
.new-sec-row .form-input{flex:1;font-size:calc(12px * var(--fs));padding:9px 13px;}
.btn-primary{width:calc(100% - 34px);margin:7px 17px 0;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;border-radius:50px;padding:14px;font-size:calc(14px * var(--fs));font-weight:900;font-family:var(--font-body);cursor:pointer;transition:all 0.2s;box-shadow:0 4px 16px color-mix(in srgb,var(--accent) 40%,transparent);}
.btn-primary:active{transform:scale(0.97);}
.btn-cancel{width:calc(100% - 34px);margin:8px 17px 0;background:var(--card2);color:var(--text2);border:1.5px solid var(--border);border-radius:50px;padding:13px;font-size:calc(13px * var(--fs));font-weight:800;font-family:var(--font-body);cursor:pointer;display:block;}

/* SETTINGS */
.settings-scroll{flex:1;overflow-y:auto;padding:10px 14px;padding-bottom:calc(var(--tab-h) + var(--safe-bottom) + 20px);}
.settings-scroll::-webkit-scrollbar{display:none;}
.s-card{background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);margin-bottom:11px;overflow:hidden;box-shadow:var(--shadow2);}
.s-card-title{font-size:9px;font-weight:800;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;padding:13px 17px 7px;}
.s-row{display:flex;align-items:center;justify-content:space-between;padding:11px 17px;border-top:1px solid var(--border);}
.s-row-l{display:flex;align-items:center;gap:11px;}
.s-row-icon{font-size:17px;width:28px;text-align:center;}
.s-row-label{font-size:calc(13px * var(--fs));font-weight:800;}
.s-row-sub{font-size:calc(10px * var(--fs));font-weight:700;color:var(--text3);margin-top:1px;}

/* COLOUR GRID */
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:8px 17px 15px;}
.color-grid.wide{grid-template-columns:repeat(5,1fr);}
.cswatch{height:42px;border-radius:14px;cursor:pointer;border:2.5px solid transparent;transition:all 0.2s;display:flex;align-items:center;justify-content:center;font-size:15px;color:transparent;}
.cswatch.active{border-color:var(--text);color:white;}
.cswatch:active{transform:scale(0.9);}
.color-section-label{font-size:9px;font-weight:800;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;padding:4px 17px 4px;margin-top:2px;}

/* THEME BTNS */
.theme-btns{display:flex;gap:8px;padding:8px 17px 14px;}
.theme-btn{flex:1;padding:12px;border-radius:16px;text-align:center;cursor:pointer;border:1.5px solid var(--border);background:var(--card2);font-family:var(--font-body);font-size:calc(12px * var(--fs));font-weight:800;color:var(--text2);transition:all 0.2s;}
.theme-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accentsoft);}

/* FONT GRID */
.font-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px 17px 15px;}
.font-opt{padding:12px 13px;border-radius:16px;border:1.5px solid var(--border);background:var(--card2);cursor:pointer;transition:all 0.2s;}
.font-opt.active{border-color:var(--accent);background:var(--accentsoft);}
.font-opt-name{font-size:8px;font-weight:800;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px;}
.font-opt-preview{font-size:13px;color:var(--text);font-weight:700;}

/* TEXT SIZE SLIDER */
.slider-wrap{padding:4px 17px 16px;}
.slider-labels{display:flex;justify-content:space-between;margin-bottom:6px;}
.slider-label{font-size:9px;font-weight:800;color:var(--text3);}
.slider-track{position:relative;height:36px;display:flex;align-items:center;}
input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:50px;background:var(--border);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;box-shadow:0 2px 10px color-mix(in srgb,var(--accent) 50%,transparent);cursor:pointer;transition:transform 0.1s;}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.2);}
.slider-dots{display:flex;justify-content:space-between;padding:0 2px;margin-top:4px;}
.slider-dot{width:5px;height:5px;border-radius:50%;background:var(--border);}
.size-preview{background:var(--card2);border-radius:16px;padding:10px 14px;margin:0 17px 14px;border:1px solid var(--border);text-align:center;}
.size-preview-text{font-size:calc(13px * var(--fs));font-weight:700;color:var(--text2);}

/* TOGGLE */
.toggle{width:44px;height:26px;border-radius:50px;background:var(--border);position:relative;cursor:pointer;transition:background 0.28s;flex-shrink:0;border:none;}
.toggle.on{background:linear-gradient(90deg,var(--accent),var(--accent2));}
.toggle::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:white;top:3px;left:3px;transition:transform 0.28s;box-shadow:0 2px 6px rgba(0,0,0,0.2);}
.toggle.on::after{transform:translateX(18px);}

/* STATS */
.stats-row{display:flex;gap:7px;padding:0 0 12px;}
.stat-chip{flex:1;background:var(--card);border-radius:18px;padding:11px 7px;border:1.5px solid var(--border);text-align:center;box-shadow:var(--shadow2);}
.stat-num{font-size:calc(20px * var(--fs));font-weight:900;color:var(--accent);}
.stat-lbl{font-size:8px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;padding:55px 28px;text-align:center;gap:9px;}
.empty-icon{font-size:44px;}
.empty-title{font-size:calc(15px * var(--fs));font-weight:800;color:var(--text2);}
.empty-sub{font-size:calc(12px * var(--fs));font-weight:700;color:var(--text3);line-height:1.6;}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bottom) + 68px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:var(--bg);border-radius:50px;padding:9px 20px;font-size:calc(12px * var(--fs));font-weight:800;z-index:999;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* RIPPLE */
.ripple-container{position:fixed;pointer-events:none;z-index:9999;}
.ripple{position:absolute;border-radius:50%;background:var(--accent);opacity:0.35;animation:rippleAnim 0.5s ease-out forwards;}
@keyframes rippleAnim{0%{transform:scale(0);opacity:0.4;}100%{transform:scale(4);opacity:0;}}
